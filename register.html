<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل مريض - Dental Smile</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>
    <nav>
        <div class="nav-logo">
            <img src="assets/images/3.jpg" alt="Dental Smile Logo">
        </div>
        <ul class="nav-links">
            <li><a href="index.html">الرئيسية</a></li>
        </ul>
    </nav>

    <div class="form-container">
        <div class="form-card">
            <h1>تسجيل بيانات المريض</h1>
            
            <section class="model-viewer-section" id="modelSection">
                <h3>حدد موقع الألم على مجسم الأسنان</h3>
                <model-viewer 
                    src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
                    alt="مجسم ثلاثي الأبعاد للفكين"
                    auto-rotate
                    camera-controls
                    shadow-intensity="1"
                    ar
                ></model-viewer>
            </section>

            <form id="patientForm">
                <div class="form-group">
                    <label for="fullName">الاسم الكامل</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>

                <div class="form-group">
                    <label for="address">العنوان</label>
                    <input type="text" id="address" name="address" required>
                </div>

                <div class="form-group">
                    <label for="age">العمر</label>
                    <input type="number" id="age" name="age" min="1" max="120" required>
                </div>

                <div class="form-group">
                    <label for="dob">تاريخ الميلاد</label>
                    <input type="date" id="dob" name="dob" required>
                </div>

                <div class="form-group">
                    <label for="phone">رقم الهاتف / واتساب</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>

                <div class="form-group">
                    <label>التاريخ الطبي</label>
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="checkbox" name="medical" value="diabetes">
                            مرض السكري
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="medical" value="bloodPressure">
                            ضغط الدم
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="medical" value="heart">
                            أمراض القلب
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="medical" value="allergies">
                            حساسية
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="painDescription">وصف الألم</label>
                    <textarea id="painDescription" name="painDescription" rows="4" placeholder="أرجو وصف الألم والمشكلة بالتفصيل..." required></textarea>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn btn-primary">إرسال البيانات</button>
                    <a href="index.html" class="btn btn-secondary">العودة للرئيسية</a>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Dental Smile. جميع الحقوق محفوظة.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
